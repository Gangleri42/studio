# Guard the committed glyphs.js against the firmware source of truth.
#
# glyphs.js is generated by the firmware's cmd/textplate from its font and
# glyph tables. Studio commits a copy so the deploy stays toolchain-free,
# but a committed copy can drift. This check regenerates glyphs.js from the
# pinned firmware and byte-compares — a regenerate-from-source guard, not a
# copy-vs-copy one. It also asserts the editor and composer copies match.
#
# To bump the font: in the firmware repo run
#   go run ./cmd/textplate glyphs.js
# copy the result over BOTH this repo's glyphs.js and textplate/glyphs.js,
# set FIRMWARE_REF below to the firmware commit you generated from, and
# commit the three changes together.
name: "glyphs.js drift check"

on:
  push:
    branches:
      - main
    paths:
      - 'glyphs.js'
      - 'textplate/glyphs.js'
      - '.github/workflows/glyphs-drift.yml'
  pull_request:
    paths:
      - 'glyphs.js'
      - 'textplate/glyphs.js'
      - '.github/workflows/glyphs-drift.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    env:
      FIRMWARE_REPO: Gangleri42/seedhammer
      # Pinned firmware commit — not `main`, so unrelated firmware edits
      # never turn this red. Bump it together with the regenerated glyphs.js
      # (see header). Public repo: the default token checks it out.
      FIRMWARE_REF: ae0dacbd003ce5a8614ea5ccba8db7675e524661
    steps:
      - name: Check out Studio (committed glyphs.js)
        uses: actions/checkout@v6

      - name: Check out firmware at the pinned commit
        uses: actions/checkout@v6
        with:
          repository: ${{ env.FIRMWARE_REPO }}
          ref: ${{ env.FIRMWARE_REF }}
          path: firmware

      - uses: actions/setup-go@v5
        with:
          go-version-file: firmware/go.mod

      - name: Regenerate from firmware and compare
        run: |
          set -euo pipefail

          # The two committed copies must be byte-identical to each other.
          if ! cmp -s glyphs.js textplate/glyphs.js; then
            echo "::error::glyphs.js and textplate/glyphs.js differ; recopy one over the other."
            exit 1
          fi

          # ...and byte-identical to a fresh regeneration from the firmware.
          ( cd firmware && go run ./cmd/textplate "$GITHUB_WORKSPACE/glyphs.gen.js" )

          if ! cmp -s glyphs.gen.js glyphs.js; then
            echo "::error::glyphs.js is stale vs firmware ${FIRMWARE_REF}. Regenerate it (see glyphs-drift.yml header), copy over glyphs.js AND textplate/glyphs.js, and bump FIRMWARE_REF."
            echo "--- first differing bytes ---"
            cmp glyphs.gen.js glyphs.js || true
            exit 1
          fi

          echo "glyphs.js in sync with firmware ${FIRMWARE_REF} ($(wc -c < glyphs.js) bytes)."
